<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RBS Cleaning Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo">RBS</div>

    <div class="progress">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-steps">
        <span class="active">1</span>
        <span>2</span>
        <span>3</span>
      </div>
    </div>
  </div>

  <!-- MAIN CARD -->
  <div class="card">

    <!-- STEP 1 (PREMIUM INTRO) -->
    <div class="step active" id="step1">

      <div class="step-content">

        <h1 class="title">
          Estimate Your Cleaning Cost
        </h1>

        <p class="subtitle">
          Accurate pricing based on square footage and service type
        </p>

        <div class="input-wrapper">
          <input 
            type="number" 
            id="sqft" 
            placeholder=" "
          >
          <label>Enter Square Feet</label>
          <div class="input-glow"></div>
        </div>

        <button class="primary-btn" onclick="nextStep(2)">
          Continue
        </button>

      </div>

    </div>

    <!-- STEP 2 -->
    <div class="step" id="step2">

      <div class="step-content">

        <h2 class="title small">Select Cleaning Type</h2>

        <div class="select-wrapper">
          <select id="type">
            <option value="regular">Regular Cleaning</option>
            <option value="deep">Deep Cleaning</option>
            <option value="rough">Post Construction (Rough)</option>
            <option value="final">Final Clean</option>
            <option value="touch">Touch Up</option>
            <option value="turnover">Apartment Turnover</option>
          </select>
          <div class="select-glow"></div>
        </div>

        <button class="primary-btn" onclick="nextStep(3)">
          Calculate
        </button>

      </div>

    </div>

    <!-- STEP 3 -->
    <div class="step" id="step3">

      <div class="step-content">

        <h2 class="title small">Your Estimate</h2>

        <div class="results">

          <div class="box low">
            <span>STARTING PRICE</span>
            <h3 id="low">$0</h3>
          </div>

          <div class="box mid highlight">
            <span>STANDARD</span>
            <h3 id="mid">$0</h3>
            <p class="tag">Most common choice</p>
          </div>

          <div class="box high">
            <span>HEAVY CONDITION</span>
            <h3 id="high">$0</h3>
          </div>

        </div>

      </div>

    </div>

  </div>

</div>

<!-- JS -->
<script src="app.js"></script>
