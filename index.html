<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RBS Cleaning Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo">RBS</div>

    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="progress-steps">
      <span class="active">1</span>
      <span>2</span>
      <span>3</span>
    </div>
  </div>

  <!-- MAIN CARD -->
  <div class="card">

    <!-- STEP 1 -->
    <div class="step active" id="step1">
      <h1 class="title">Estimate Your Cleaning Cost</h1>
      <p class="subtitle">Accurate pricing based on square footage</p>

      <div class="input-wrapper">
        <input 
          type="number" 
          id="sqft" 
          placeholder="Enter Square Feet"
        >
      </div>

      <button class="primary-btn" id="step1Btn">
        Continue
      </button>
    </div>

    <!-- STEP 2 -->
    <div class="step" id="step2">
      <h2 class="title">Select Cleaning Type</h2>

      <select id="type" class="select">
        <option value="regular">Regular Cleaning</option>
        <option value="deep">Deep Cleaning</option>
        <option value="rough">Post Construction (Rough)</option>
        <option value="final">Final Clean</option>
        <option value="touch">Touch Up</option>
        <option value="turnover">Apartment Turnover</option>
      </select>

      <button class="primary-btn" id="step2Btn">
        Calculate
      </button>

      <button class="back-btn" id="backTo1">
        ← Back
      </button>
    </div>

    <!-- STEP 3 -->
    <div class="step" id="step3">
      <h2 class="title">Your Estimate</h2>

      <div class="results">

        <div class="box low">
          <span>STARTING</span>
          <h3 id="low">$0</h3>
        </div>

        <div class="box mid">
          <span>STANDARD</span>
          <h3 id="mid">$0</h3>
        </div>

        <div class="box high">
          <span>PREMIUM</span>
          <h3 id="high">$0</h3>
        </div>

      </div>

      <button class="back-btn" id="backTo2">
        ← Back
      </button>

    </div>

  </div>

</div>

<!-- JS (must be last) -->
<script src="app.js"></script>

</body>
</html>
