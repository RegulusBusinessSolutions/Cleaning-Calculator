<!DOCTYPE html>
<html>
<head>
  <title>RBS Cleaning Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="card">

  <div class="logo">RBS</div>
  <h2>Cleaning Price Calculator</h2>

  <input type="number" id="sqft" placeholder="Enter Square Feet">

  <select id="type">
    <option value="regular">Regular Cleaning</option>
    <option value="deep">Deep Cleaning</option>
    <option value="rough">Post Construction (Rough)</option>
    <option value="final">Final Clean</option>
    <option value="touch">Touch Up</option>
    <option value="turnover">Apartment Turnover</option>
  </select>

  <div class="results">

    <div class="box low">
      <span>LOW</span>
      <h3 id="low">$0</h3>
    </div>

    <div class="box mid">
      <span>RECOMMENDED</span>
      <h3 id="mid">$0</h3>
    </div>

    <div class="box high">
      <span>PREMIUM</span>
      <h3 id="high">$0</h3>
    </div>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
