<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RBS Cleaning Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo">RBS</div>

    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="progress-steps">
      <span class="active">1</span>
      <span>2</span>
      <span>3</span>
    </div>
  </div>

  <!-- MAIN CARD -->
  <div class="card">

    <!-- STEP 1 -->
    <div class="step active" id="step1">
      <h1 class="title">Estimate Your Cleaning Cost</h1>
      <p class="subtitle">Enter your property size</p>

      <div class="input-wrapper">
        <input 
          type="number" 
          id="sqft" 
          placeholder="Square Feet (e.g. 1500)"
        >
      </div>

      <button class="primary-btn" id="step1Btn">
        Continue
      </button>
    </div>

    <!-- STEP 2 -->
    <div class="step" id="step2">

      <h2 class="title">Select Service</h2>

      <div class="service-grid">

        <div class="service-card" data-type="standard">
          <h3>Standard Cleaning</h3>
          <p>Maintenance cleaning</p>
        </div>

        <div class="service-card" data-type="deep">
          <h3>Deep Cleaning</h3>
          <p>Detailed + heavy areas</p>
        </div>

        <div class="service-card" data-type="move">
          <h3>Move In / Out</h3>
          <p>Empty property cleaning</p>
        </div>

      </div>

      <button class="primary-btn" id="step2Btn">
        Continue
      </button>

    </div>

    <!-- STEP 3 -->
    <div class="step" id="step3">

      <h2 class="title">Your Estimate</h2>

      <div class="result-main">
        <h1 id="price">$0</h1>
        <p id="time">--</p>
      </div>

      <button class="secondary-btn" id="restartBtn">
        Start Over
      </button>

    </div>

  </div>

</div>

<!-- JS -->
<script src="app.js"></script>

</body>
</html>
