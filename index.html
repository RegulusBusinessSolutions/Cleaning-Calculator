<!DOCTYPE html>
<html>
<head>
  <title>Cleaning Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h2>Cleaning Price Calculator</h2>

<input type="number" id="sqft" placeholder="Square Feet">

<select id="type">
  <option value="regular">Regular Cleaning</option>
  <option value="deep">Deep Cleaning</option>
  <option value="rough">Post Construction (Rough)</option>
  <option value="final">Final Clean</option>
  <option value="touch">Touch Up</option>
  <option value="turnover">Apartment Turnover</option>
</select>

<h3>Low: $<span id="low">0</span></h3>
<h3>Mid: $<span id="mid">0</span></h3>
<h3>High: $<span id="high">0</span></h3>

<script src="app.js"></script>

</body>
</html>
